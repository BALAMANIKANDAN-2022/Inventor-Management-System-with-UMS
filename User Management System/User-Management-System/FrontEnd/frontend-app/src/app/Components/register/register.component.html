<div class="container mt-5" style="max-width: 500px;">
  <h3 class="text-center mb-4">User Registration</h3>

  <form [formGroup]="registerForm" (ngSubmit)="submit()">

    <!-- Name -->
    <div class="mb-3">
      <label class="form-label">Name</label>
      <input type="text" class="form-control" formControlName="name">
      <small class="text-danger" *ngIf="registerForm.get('name')?.touched && registerForm.get('name')?.invalid">
        Name is required
      </small>
    </div>

    <!-- Email -->
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" formControlName="email">
      <small class="text-danger" *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid">
        Enter a valid email
      </small>
    </div>

    <!-- Password -->
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" formControlName="password">
      <small class="text-danger" *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid">
        Minimum 6 characters required
      </small>
    </div>

    <!-- Confirm Password -->
    <div class="mb-3">
      <label class="form-label">Confirm Password</label>
      <input type="password" class="form-control" formControlName="confirmPassword">
      <small class="text-danger" *ngIf="registerForm.errors?.['mismatch'] && registerForm.get('confirmPassword')?.touched">
        Passwords do not match
      </small>
    </div>

    <!-- Role -->
    <!-- <div class="mb-3">
      <label class="form-label">Role</label>
      <select class="form-select" formControlName="role">
        <option value="ROLE_USER">User</option>
        <option value="ROLE_ADMIN">Admin</option>
      </select>
    </div> -->

    <!-- Messages -->
    <div class="alert alert-danger" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <div class="alert alert-success" *ngIf="successMessage">
      {{ successMessage }}
    </div>

    <!-- Register Button -->
    <button type="submit" class="btn btn-primary w-100">
      Register
    </button>
  </form>

  <!-- Login Link -->
  <div class="text-center mt-3">
    <span>Already a user?</span>
    <a href="javascript:void(0)" (click)="goToLogin()"> Login here</a>
  </div>
</div>
