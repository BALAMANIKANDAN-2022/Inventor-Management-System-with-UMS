<div class="container mt-5" style="max-width: 450px;">
  <h3 class="text-center mb-4">Login</h3>

  <form [formGroup]="loginForm" (ngSubmit)="submit()">

    <!-- Email -->
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" formControlName="email">
      <small class="text-danger"
        *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
        Enter a valid email
      </small>
    </div>

    <!-- Password -->
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" formControlName="password">
      <small class="text-danger"
        *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
        Password is required
      </small>
    </div>

    <!-- Error -->
    <div class="alert alert-danger" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <!-- Login -->
    <button type="submit" class="btn btn-primary w-100">
      Login
    </button>
  </form>

  <!-- Links -->
  <div class="d-flex justify-content-between mt-3">
    <div><a href="javascript:void(0)" (click)="goToForgotPassword()">Forgot Password?</a></div>
    <div><span>New user? </span>
    <a href="javascript:void(0)" (click)="goToRegister()">Register</a></div>
  </div>
 
</div>
